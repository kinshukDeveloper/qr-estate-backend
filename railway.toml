# railway.toml — Railway deployment configuration
# Place in: qr-estate/backend/railway.toml

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run db:migrate && node src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "qr-estate-api"

[services.variables]
NODE_ENV = "production"
PORT = "5000"
